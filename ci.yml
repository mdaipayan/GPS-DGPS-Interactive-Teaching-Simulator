name: Test & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run core simulation tests
      run: pytest tests/ -v

    - name: Verify Streamlit app loads
      run: |
        timeout 15 streamlit run app.py --server.headless true \
          --server.port 8501 & sleep 10
        curl -f http://localhost:8501 || true
